services:
  db:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: jeli_test
      POSTGRES_PASSWORD: jeli_test_password
      POSTGRES_DB: jeli_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jeli_test"]
      interval: 5s
      timeout: 5s
      retries: 10
