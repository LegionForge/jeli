name: Lint Workflows

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/*.yml"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/*.yml"

permissions:
  contents: read

jobs:
  lint:
    name: Zizmor Workflow Linting
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # zizmor-action uploads SARIF to the Security tab

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          persist-credentials: false

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@6599ee8b7a49aef6a770f63d261d214911a7ce02  # v0.6.0
        with:
          inputs: ".github/workflows"
