version: '3.9'

services:
  hermes:
    image: python:3.11-slim
    container_name: hermes-sandbox
    working_dir: /app
    volumes:
      - ./hermes-workspace:/workspace
      - hermes-home:/.hermes
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - DISCORD_ALLOWED_USERS=${DISCORD_ALLOWED_USERS}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - HERMES_WRITE_SAFE_ROOT=/workspace
      - HERMES_LOG_LEVEL=INFO
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      - jeli-net
    command: >
      sh -c "
        pip install --quiet hermes-discord &&
        hermes start
      "
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp
      - /run

  jeli-postgres:
    image: postgres:16-alpine
    container_name: jeli-postgres
    environment:
      - POSTGRES_USER=ob1_app
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=openbrain
    volumes:
      - jeli-db:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    networks:
      - jeli-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ob1_app"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  jeli-net:
    driver: bridge

volumes:
  hermes-home:
  jeli-db:
