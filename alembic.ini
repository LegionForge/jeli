# Alembic Configuration File for Jeli Scoped MCP

[alembic]
# path to migration scripts
sqlalchemy.url = driver://user:password@localhost/dbname
script_location = alembic

# template used to generate migration file names; The default value is %%(rev)s_%%(slug)s
file_template = %%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present
prepend_sys_path = .

# timezone to use when rendering the date
# within the migration file as well as the filename.
# string value is passed to zoneinfo.ZoneInfo()
# Leave blank for localtime
sqlalchemy.echo = false

# A list of regex patterns that match a source ignore pattern.
# source_ignore_pattern is a keyword parameter
# from the [alembic] section of the config.

source_ignore_patterns = migrations,\.eggs,\.git,__pycache__,\.venv

# When set to true, directs the script to begin the
# transaction block following alembic.context.configure,
# (instead of the default, which is to NOT begin a block)
begin_transaction = false

# Logging configuration
[loggers]
keys = sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers =
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
